name: Hotfix

on:
  workflow_dispatch:
    inputs:
      base_version:
        description: "Release version to hotfix (e.g., 1.3.0) — must have a final release tag"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.base_version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be in semver format (e.g., 1.3.0)"
            exit 1
          fi

      - name: Check base release tag exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh api repos/${{ github.repository }}/git/ref/tags/v${{ inputs.base_version }} --silent 2>/dev/null; then
            echo "::error::Release tag v${{ inputs.base_version }} does not exist — can only hotfix a finalised release"
            exit 1
          fi

      - name: Checkout from base release tag
        uses: actions/checkout@v6
        with:
          ref: v${{ inputs.base_version }}
          fetch-depth: 0

      - name: Determine hotfix version
        id: hotfix
        run: |
          MAJOR=$(echo "${{ inputs.base_version }}" | cut -d. -f1)
          MINOR=$(echo "${{ inputs.base_version }}" | cut -d. -f2)
          PATCH=$(echo "${{ inputs.base_version }}" | cut -d. -f3)

          # Find the highest existing patch version for this major.minor
          HIGHEST_PATCH=$PATCH
          while true; do
            NEXT_PATCH=$((HIGHEST_PATCH + 1))
            if git ls-remote --tags origin "refs/tags/v${MAJOR}.${MINOR}.${NEXT_PATCH}" | grep -q . || \
               git ls-remote --tags origin "refs/tags/v${MAJOR}.${MINOR}.${NEXT_PATCH}-rc.*" | grep -q .; then
              HIGHEST_PATCH=$NEXT_PATCH
            else
              break
            fi
          done

          HOTFIX_VERSION="${MAJOR}.${MINOR}.$((HIGHEST_PATCH + 1))"
          echo "version=$HOTFIX_VERSION" >> $GITHUB_OUTPUT
          echo "Hotfix version: $HOTFIX_VERSION"

      - name: Create hotfix release branch
        run: |
          BRANCH="release/${{ steps.hotfix.outputs.version }}"
          if git ls-remote --heads origin "$BRANCH" | grep -q .; then
            echo "::error::Branch $BRANCH already exists"
            exit 1
          fi
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

      - name: Summary
        run: |
          echo "## Hotfix Branch Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Hotfixing:** v${{ inputs.base_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Hotfix version:** ${{ steps.hotfix.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** release/${{ steps.hotfix.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branched from:** v${{ inputs.base_version }} ($(git rev-parse HEAD))" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Push your fix to \`release/${{ steps.hotfix.outputs.version }}\` (directly or via PR)" >> $GITHUB_STEP_SUMMARY
          echo "2. Run **Tag New RC** with version \`${{ steps.hotfix.outputs.version }}\` to start promotion" >> $GITHUB_STEP_SUMMARY
          echo "3. After prod deployment, cherry-pick the fix back to main" >> $GITHUB_STEP_SUMMARY
