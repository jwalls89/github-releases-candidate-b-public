name: Promote

on:
  workflow_dispatch:
    inputs:
      version:
        description: "RC tag to promote (e.g., v1.2.0-rc.1)"
        required: true
        type: string

concurrency:
  group: promote
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate RC tag format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "::error::Version must be an RC tag (e.g., v1.2.0-rc.1)"
            exit 1
          fi

      - name: Validate tag exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh api repos/${{ github.repository }}/git/ref/tags/${{ inputs.version }} --silent 2>/dev/null; then
            echo "::error::Tag ${{ inputs.version }} does not exist"
            exit 1
          fi

  deploy-test:
    needs: validate
    uses: ./.github/workflows/deploy.yml
    with:
      environment: test
      version: ${{ inputs.version }}

  deploy-preprod:
    needs: deploy-test
    uses: ./.github/workflows/deploy.yml
    with:
      environment: preprod
      version: ${{ inputs.version }}

  deploy-prod:
    needs: deploy-preprod
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prod
      version: ${{ inputs.version }}

  finalise:
    needs: deploy-prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}
          fetch-depth: 0

      - name: Determine final version
        id: final
        run: |
          FINAL_VERSION=$(echo "${{ inputs.version }}" | sed 's/-rc\.[0-9]*//')
          echo "version=$FINAL_VERSION" >> $GITHUB_OUTPUT
          echo "Final version: $FINAL_VERSION"

      - name: Create final release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.final.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.final.outputs.version }} already exists — skipping tag creation"
          else
            git tag -a ${{ steps.final.outputs.version }} -m "Release ${{ steps.final.outputs.version }}"
            git push origin ${{ steps.final.outputs.version }}
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view ${{ steps.final.outputs.version }} >/dev/null 2>&1; then
            echo "Release ${{ steps.final.outputs.version }} already exists — skipping"
          else
            gh release create ${{ steps.final.outputs.version }} \
              --title "${{ steps.final.outputs.version }}" \
              --generate-notes \
              --latest
          fi

      - name: Determine release branch
        id: branch
        run: |
          # Strip v prefix and -rc.N suffix to get X.Y.Z, then build branch name
          VERSION=$(echo "${{ inputs.version }}" | sed 's/^v//; s/-rc\.[0-9]*//')
          echo "name=release/${VERSION}" >> $GITHUB_OUTPUT

      - name: Check for merge-back need
        id: mergeback
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          AHEAD=$(git rev-list --count origin/main..origin/${BRANCH})
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          if [[ "$AHEAD" -eq 0 ]]; then
            echo "Release branch has no new commits — no merge-back needed"
            echo "needed=false" >> $GITHUB_OUTPUT
          else
            echo "Release branch is $AHEAD commit(s) ahead of main — merge-back required"
            echo "needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Annotate GitHub Release with merge-back note
        if: steps.mergeback.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_NOTES=$(gh release view ${{ steps.final.outputs.version }} --json body --jq '.body')
          MERGE_NOTE="---"
          MERGE_NOTE="${MERGE_NOTE}\n\n⚠️ **Merge-back required:** This release has ${{ steps.mergeback.outputs.ahead }} commit(s) on \`${{ steps.mergeback.outputs.branch }}\` that are not on \`main\`. See the merge-back issue for instructions."
          gh release edit ${{ steps.final.outputs.version }} \
            --notes "$(echo -e "${EXISTING_NOTES}\n\n${MERGE_NOTE}")"

      - name: Create merge-back issue
        if: steps.mergeback.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.mergeback.outputs.branch }}"
          VERSION="${{ steps.final.outputs.version }}"
          gh issue create \
            --title "Merge back: ${VERSION}" \
            --body "$(echo -e "Release **${VERSION}** has ${{ steps.mergeback.outputs.ahead }} commit(s) on \`${BRANCH}\` that need merging back to \`main\`.\n\n## Steps\n\n\`\`\`bash\ngit fetch origin\ngit checkout main\ngit pull origin main\ngit checkout -b merge-back/${VERSION#v}\ngit merge origin/${BRANCH}\n# Resolve conflicts if any\ngit push origin merge-back/${VERSION#v}\n\`\`\`\n\nThen open a PR from \`merge-back/${VERSION#v}\` to \`main\`:\n\nhttps://github.com/${{ github.repository }}/compare/main...merge-back/${VERSION#v}?expand=1\n\nClose this issue once the PR is merged.")"

      - name: Summary
        run: |
          echo "## Release Finalised" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Release:** ${{ steps.final.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **From RC:** ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Release created** with auto-generated notes" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.mergeback.outputs.needed }}" == "true" ]]; then
            echo "- **Merge-back required** — ${{ steps.mergeback.outputs.ahead }} commit(s) need merging to main. See issue." >> $GITHUB_STEP_SUMMARY
          else
            echo "- **No merge-back needed** — release branch has no new commits" >> $GITHUB_STEP_SUMMARY
          fi
