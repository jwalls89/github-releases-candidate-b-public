name: Promote

on:
  workflow_dispatch:
    inputs:
      version:
        description: "RC tag to promote (e.g., v1.2.0-rc.1)"
        required: true
        type: string

concurrency:
  group: promote
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate RC tag format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "::error::Version must be an RC tag (e.g., v1.2.0-rc.1)"
            exit 1
          fi

      - name: Validate tag exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh api repos/${{ github.repository }}/git/ref/tags/${{ inputs.version }} --silent 2>/dev/null; then
            echo "::error::Tag ${{ inputs.version }} does not exist"
            exit 1
          fi

  deploy-test:
    needs: validate
    uses: ./.github/workflows/deploy.yml
    with:
      environment: test
      version: ${{ inputs.version }}

  deploy-preprod:
    needs: deploy-test
    uses: ./.github/workflows/deploy.yml
    with:
      environment: preprod
      version: ${{ inputs.version }}

  deploy-prod:
    needs: deploy-preprod
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prod
      version: ${{ inputs.version }}

  finalise:
    needs: deploy-prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}
          fetch-depth: 0

      - name: Determine final version
        id: final
        run: |
          FINAL_VERSION=$(echo "${{ inputs.version }}" | sed 's/-rc\.[0-9]*//')
          echo "version=$FINAL_VERSION" >> $GITHUB_OUTPUT
          echo "Final version: $FINAL_VERSION"

      - name: Create final release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.final.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.final.outputs.version }} already exists — skipping tag creation"
          else
            git tag -a ${{ steps.final.outputs.version }} -m "Release ${{ steps.final.outputs.version }}"
            git push origin ${{ steps.final.outputs.version }}
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view ${{ steps.final.outputs.version }} >/dev/null 2>&1; then
            echo "Release ${{ steps.final.outputs.version }} already exists — skipping"
          else
            gh release create ${{ steps.final.outputs.version }} \
              --title "${{ steps.final.outputs.version }}" \
              --generate-notes \
              --latest
          fi

      - name: Determine release branch
        id: branch
        run: |
          # Strip v prefix and -rc.N suffix to get X.Y.Z, then build branch name
          VERSION=$(echo "${{ inputs.version }}" | sed 's/^v//; s/-rc\.[0-9]*//')
          echo "name=release/${VERSION}" >> $GITHUB_OUTPUT

      - name: Open merge-back PR if release branch has diverged
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          # Check if release branch has commits not on main
          AHEAD=$(git rev-list --count origin/main..origin/${BRANCH})
          if [[ "$AHEAD" -eq 0 ]]; then
            echo "Release branch has no new commits — no merge-back needed"
          else
            echo "Release branch is $AHEAD commit(s) ahead of main — opening merge-back PR"
            # Check if a merge-back PR already exists
            EXISTING=$(gh pr list --base main --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
            if [[ -n "$EXISTING" ]]; then
              echo "Merge-back PR #$EXISTING already exists — skipping"
            else
              BODY="Automated merge-back of release branch changes to main."
              BODY="${BODY}\n\n**Release:** ${{ steps.final.outputs.version }}"
              BODY="${BODY}\n**Branch:** ${{ steps.branch.outputs.name }}"
              BODY="${BODY}\n\nThis PR brings fixes made during release promotion back to main."
              gh pr create \
                --base main \
                --head "$BRANCH" \
                --title "Merge back: ${{ steps.final.outputs.version }}" \
                --body "$(echo -e "$BODY")"
            fi
          fi

      - name: Summary
        run: |
          echo "## Release Finalised" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Release:** ${{ steps.final.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **From RC:** ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Release created** with auto-generated notes" >> $GITHUB_STEP_SUMMARY
