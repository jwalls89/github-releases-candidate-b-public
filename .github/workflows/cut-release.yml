name: Cut Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.0)"
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  cut-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be in semver format (e.g., 1.2.0)"
            exit 1
          fi

      - name: Check no other release is in-flight
        run: |
          EXISTING=$(git ls-remote --heads origin 'release/*' | awk '{print $2}' | sed 's|refs/heads/||')
          if [[ -n "$EXISTING" ]]; then
            echo "::error::Another release branch already exists: $EXISTING. Only one release at a time."
            exit 1
          fi

      - name: Check release branch does not already exist
        run: |
          if git ls-remote --heads origin release/${{ inputs.version }} | grep -q .; then
            echo "::error::Branch release/${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Check RC tag does not already exist
        run: |
          if git ls-remote --tags origin refs/tags/v${{ inputs.version }}-rc.1 | grep -q .; then
            echo "::error::Tag v${{ inputs.version }}-rc.1 already exists"
            exit 1
          fi

      - name: Create release branch
        run: |
          git checkout -b release/${{ inputs.version }}
          git push origin release/${{ inputs.version }}

      - name: Create first RC tag
        run: |
          git tag v${{ inputs.version }}-rc.1
          git push origin v${{ inputs.version }}-rc.1

      - name: Trigger promotion pipeline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run promote.yml -f version=v${{ inputs.version }}-rc.1

      - name: Summary
        run: |
          echo "## Release Cut" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** release/${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** v${{ inputs.version }}-rc.1" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** $(git rev-parse HEAD)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The **Promote** workflow has been triggered automatically." >> $GITHUB_STEP_SUMMARY
